name: Burn Subtitles

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Direct/Pixeldrain video URL"
        required: true
        type: string
      srt_url:
        description: "Raw URL to the .srt file (gist)"
        required: true
        type: string
      sub_type:
        description: "english or sinhala"
        required: true
        type: string
      chat_id:
        description: "Telegram chat_id to notify when done"
        required: true
        type: string

jobs:
  burn:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo (for scripts)
        uses: actions/checkout@v4

      - name: Install ffmpeg, libraqm, Pillow, and Sinhala font
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libraqm0
          pip install --quiet --upgrade Pillow
          python3 -c "from PIL import features; assert features.check('raqm'), 'raqm NOT available'; print('raqm OK')"
          mkdir -p sinhala-font
          curl -L -o sinhala-font/AbhayaLibre-Bold.ttf \
            "https://github.com/google/fonts/raw/main/ofl/abhayalibre/AbhayaLibre-Bold.ttf"
          ffmpeg -version

      - name: Set up Python deps
        run: |
          pip install --quiet google-generativeai google-api-python-client google-auth requests

      - name: Download SRT
        run: curl -L -o subs_raw.srt "${{ inputs.srt_url }}"

      - name: Translate to Sinhala (only if needed)
        if: inputs.sub_type == 'english'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/translate.py subs_raw.srt subs.srt

      - name: Use subtitles as-is (already Sinhala)
        if: inputs.sub_type != 'english'
        run: cp subs_raw.srt subs.srt

      - name: Download video
        run: |
          set -e
          URL="${{ inputs.video_url }}"
          if echo "$URL" | grep -q "pixeldrain.com/u/"; then
            FILE_ID=$(echo "$URL" | sed -E 's#.*pixeldrain\.com/u/([a-zA-Z0-9]+).*#\1#')
            URL="https://pixeldrain.com/api/file/${FILE_ID}"
          fi
          curl -f -L -A "Mozilla/5.0" -e "https://pixeldrain.com/" -o input_video.mp4 "$URL"
          ls -lh input_video.mp4
          file input_video.mp4
          if ! file input_video.mp4 | grep -qE "MP4|Matroska|ISO Media|WebM"; then
            echo "ERROR: downloaded file is not a valid video (link may be expired/invalid)"
            head -c 500 input_video.mp4
            exit 1
          fi

      - name: Render subtitle overlay (Pillow + raqm - correct Sinhala shaping)
        run: |
          set -e
          python scripts/render_subtitles_overlay.py input_video.mp4 subs.srt overlay.mov "sinhala-font/AbhayaLibre-Bold.ttf"

      - name: Composite overlay onto video
        run: |
          set -e
          ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=p=0 input_video.mp4
          ffmpeg -y -i input_video.mp4 -i overlay.mov \
            -filter_complex "[1:v]scale2ref=w=iw:h=ih[ov][base];[base][ov]overlay=0:0:format=auto[v]" \
            -map "[v]" -map 0:a? \
            -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p \
            -c:a aac -b:a 160k \
            -movflags +faststart \
            output_final.mp4
          echo "--- Output resolution ---"
          ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=p=0 output_final.mp4
          ls -lh output_final.mp4

      - name: Upload to Google Drive
        id: drive
        continue-on-error: true
        env:
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -e
          echo "$GDRIVE_SA_JSON_B64" | base64 -d > sa.json
          GDRIVE_SA_JSON=sa.json python scripts/upload_drive.py output_final.mp4
          echo "link=$(cat drive_link.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload to Abyss.to
        id: abyss
        continue-on-error: true
        env:
          ABYSS_API_KEY: ${{ secrets.ABYSS_API_KEY }}
        run: |
          set -e
          python scripts/upload_abyss.py output_final.mp4
          echo "link=$(cat abyss_link.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload to Pixeldrain
        id: pixeldrain
        continue-on-error: true
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          set -e
          python scripts/upload_pixeldrain.py output_final.mp4
          echo "link=$(cat pixeldrain_link.txt)" >> "$GITHUB_OUTPUT"

      - name: Notify on Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          DRIVE_LINK: ${{ steps.drive.outputs.link }}
          ABYSS_LINK: ${{ steps.abyss.outputs.link }}
          PIXELDRAIN_LINK: ${{ steps.pixeldrain.outputs.link }}
        run: |
          TEXT="🎉 Done!"$'\n'
          if [ -n "$DRIVE_LINK" ]; then TEXT="${TEXT}"$'\n'"📁 Drive: ${DRIVE_LINK}"; fi
          if [ -n "$ABYSS_LINK" ]; then TEXT="${TEXT}"$'\n'"▶️ Abyss: ${ABYSS_LINK}"; fi
          if [ -n "$PIXELDRAIN_LINK" ]; then TEXT="${TEXT}"$'\n'"📥 Pixeldrain: ${PIXELDRAIN_LINK}"; fi
          if [ -z "$DRIVE_LINK" ] && [ -z "$ABYSS_LINK" ] && [ -z "$PIXELDRAIN_LINK" ]; then
            TEXT="❌ All uploads failed. Check the GitHub Actions log."
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode text="${TEXT}"

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burned-video
          path: output_final.mp4
          retention-days: 3